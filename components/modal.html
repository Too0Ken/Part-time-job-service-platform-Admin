<div class="modal-backdrop" id="modal-demo">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">确认操作</span>
      <span class="modal-close" onclick="closeModal('modal-demo')">×</span>
    </div>
    <div class="modal-body">
      <p>确定要执行此操作吗？此操作不可撤销。</p>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('modal-demo')">取消</button>
      <button class="btn btn-primary">确定</button>
    </div>
  </div>
</div>
