<form class="form">
  <div class="form-item">
    <label class="form-label required">用户名</label>
    <div class="form-content">
      <input class="input" type="text" placeholder="请输入用户名" style="width: 300px;">
      <div class="form-error" style="display: none;">用户名不能为空</div>
    </div>
  </div>
  
  <div class="form-item">
    <label class="form-label required">邮箱</label>
    <div class="form-content">
      <input class="input" type="email" placeholder="请输入邮箱" style="width: 300px;">
      <div class="form-error" style="display: none;">请输入正确的邮箱格式</div>
    </div>
  </div>
  
  <div class="form-item">
    <label class="form-label">角色</label>
    <div class="form-content">
      <select class="select" style="width: 300px;">
        <option value="">请选择角色</option>
        <option value="operator">运营专员</option>
        <option value="risk">风控专员</option>
        <option value="finance">财务专员</option>
        <option value="service">客服专员</option>
      </select>
    </div>
  </div>
  
  <div class="form-item">
    <label class="form-label">备注</label>
    <div class="form-content">
      <textarea class="input" placeholder="请输入备注" style="width: 300px; height: 80px; padding-top: 8px;"></textarea>
    </div>
  </div>
  
  <div class="form-item">
    <div class="form-content" style="margin-left: 120px;">
      <button class="btn btn-primary" type="submit">保存</button>
      <button class="btn" type="button" style="margin-left: 8px;">取消</button>
    </div>
  </div>
</form>
